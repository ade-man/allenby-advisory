<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Tech Architecture — Whiteboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f12;--bg2:#1a1a20;--bg3:#24242c;--tx1:#e8e8ec;--tx2:#9898a4;--tx3:#68687a;
  --bd:#2a2a36;--bd2:#38384a;
  --api:#34d399;--manual:#f97316;--auto:#a78bfa;
  --pur:#7c6cf0;--pur-bg:#1e1a3a;--pur-bd:#3d3470;
  --tea:#34d399;--tea-bg:#0c2e24;--tea-bd:#1a5c46;
  --cor:#f97316;--cor-bg:#2e1a0c;--cor-bd:#5c3a1a;
  --pin:#f472b6;--pin-bg:#2e0c20;--pin-bd:#5c1a40;
  --blu:#60a5fa;--blu-bg:#0c1a2e;--blu-bd:#1a3a5c;
  --gra:#9898a4;--gra-bg:#1a1a20;--gra-bd:#38384a;
  --amb:#fbbf24;--amb-bg:#2e2a0c;--amb-bd:#5c541a;
  --grn:#34d399;--grn-bg:#0c2e1a;--grn-bd:#1a5c3a;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--tx1);font-family:'DM Sans',system-ui,sans-serif}

#toolbar{position:fixed;top:0;left:0;right:0;height:48px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100}
#toolbar h1{font-size:14px;font-weight:500;letter-spacing:-0.02em;white-space:nowrap}
.tb-sep{width:1px;height:24px;background:var(--bd)}
.tb-btn{font-size:12px;padding:6px 14px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--tx2);cursor:pointer;transition:all .15s;font-family:inherit;white-space:nowrap}
.tb-btn:hover{background:var(--bg3);color:var(--tx1)}
.tb-btn.on{background:#7c6cf020;color:var(--pur);border-color:var(--pur-bd)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
#zoom-display{font-size:11px;color:var(--tx3);min-width:40px;text-align:center;font-variant-numeric:tabular-nums}
.tb-icon{width:32px;height:32px;border-radius:6px;border:1px solid var(--bd);background:transparent;color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:16px}
.tb-icon:hover{background:var(--bg3);color:var(--tx1)}

#canvas-container{position:fixed;top:48px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab}
#canvas-container.grabbing{cursor:grabbing}
#canvas{position:absolute;transform-origin:0 0;will-change:transform}

#lines-svg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}

.sys-box{position:absolute;border-radius:10px;border:1px solid;padding:14px 16px;min-width:180px;max-width:240px;cursor:pointer;transition:border-color .2s,box-shadow .2s,opacity .2s;user-select:none}
.sys-box:hover{box-shadow:0 0 0 1px rgba(255,255,255,0.08),0 8px 32px rgba(0,0,0,0.4)}
.sys-box.dimmed{opacity:0.12}
.sys-box.highlight{box-shadow:0 0 0 2px var(--pur),0 0 24px rgba(124,108,240,0.2)}
.sys-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.sys-title{font-size:13px;font-weight:600;line-height:1.3;letter-spacing:-0.01em}
.sys-sub{font-size:11px;opacity:0.55;margin-top:2px;font-style:italic;line-height:1.3}
.collapse-btn{width:20px;height:20px;border-radius:4px;border:none;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;margin-top:1px}
.collapse-btn:hover{background:rgba(255,255,255,0.15);color:#fff}
.sys-data{margin-top:10px;display:flex;flex-wrap:wrap;gap:4px;overflow:hidden;transition:max-height .3s ease,opacity .25s ease}
.sys-data.collapsed{max-height:0!important;opacity:0;margin-top:0}
.data-pill{font-size:10px;padding:4px 9px;border-radius:5px;border:1px dashed rgba(255,255,255,0.18);background:rgba(255,255,255,0.04);line-height:1.2;white-space:nowrap}
.data-pill.shared{border-style:solid;border-color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);font-weight:500}
.int-badge{position:absolute;top:-6px;right:-6px;width:14px;height:14px;border-radius:50%;border:2px solid var(--bg);font-size:0}
.int-api{background:var(--api)}.int-manual{background:var(--manual)}.int-auto{background:var(--auto)}

.c-pur{background:var(--pur-bg);border-color:var(--pur-bd);color:#d4ccff}
.c-tea{background:var(--tea-bg);border-color:var(--tea-bd);color:#a7f3d0}
.c-cor{background:var(--cor-bg);border-color:var(--cor-bd);color:#fed7aa}
.c-pin{background:var(--pin-bg);border-color:var(--pin-bd);color:#fbcfe8}
.c-blu{background:var(--blu-bg);border-color:var(--blu-bd);color:#bfdbfe}
.c-gra{background:var(--gra-bg);border-color:var(--gra-bd);color:#d4d4dc}
.c-amb{background:var(--amb-bg);border-color:var(--amb-bd);color:#fde68a}
.c-grn{background:var(--grn-bg);border-color:var(--grn-bd);color:#a7f3d0}

#legend{position:fixed;bottom:16px;left:16px;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:10px 14px;display:flex;gap:16px;font-size:11px;color:var(--tx2);z-index:100;align-items:center}
.leg-i{display:flex;align-items:center;gap:5px}
.leg-dot{width:10px;height:10px;border-radius:50%}
.leg-line{width:22px;height:0;border-top:2px solid}

#minimap{position:fixed;bottom:16px;right:16px;width:180px;height:120px;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;z-index:100;overflow:hidden;cursor:pointer}
#minimap canvas{width:100%;height:100%}
#minimap .viewport-rect{position:absolute;border:1.5px solid var(--pur);border-radius:2px;pointer-events:none;opacity:0.7}

#info-panel{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:14px 20px;z-index:100;display:none;max-width:500px;font-size:12px;line-height:1.6;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
#info-panel.open{display:block}
#info-panel h4{font-size:13px;font-weight:600;margin-bottom:8px}
.conn-row{display:flex;align-items:center;gap:8px;padding:3px 0}
.conn-tag{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:500;flex-shrink:0}
.ct-api{background:rgba(52,211,153,0.15);color:#34d399}
.ct-manual{background:rgba(249,115,22,0.15);color:#f97316}
.ct-auto{background:rgba(167,139,250,0.15);color:#a78bfa}

.dot-grid{position:absolute;top:0;left:0;width:100%;height:100%;background-image:radial-gradient(circle,var(--bd) 1px,transparent 1px);background-size:24px 24px;pointer-events:none;opacity:0.4}

#help-hint{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:8px 16px;font-size:11px;color:var(--tx2);z-index:100;transition:opacity .5s;pointer-events:none}
</style>
</head>
<body>

<div id="toolbar">
  <h1>Event tech architecture</h1>
  <div class="tb-sep"></div>
  <button class="tb-btn on" onclick="setView('exhibitor',this)">Exhibitor lifecycle</button>
  <button class="tb-btn" onclick="setView('attendee',this)">Attendee journey</button>
  <button class="tb-btn" onclick="setView('content',this)">Content pipeline</button>
  <button class="tb-btn" onclick="setView('commercial',this)">Commercial flow</button>
  <button class="tb-btn" onclick="setView('full',this)">Full map</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="collapse-all-btn" onclick="toggleAll()">Collapse all</button>
  <div class="tb-right">
    <button class="tb-icon" onclick="zoomTo(zoom*1.25)" title="Zoom in">+</button>
    <span id="zoom-display">100%</span>
    <button class="tb-icon" onclick="zoomTo(zoom*0.8)" title="Zoom out">−</button>
    <button class="tb-icon" onclick="fitToView()" title="Fit to view">⊡</button>
  </div>
</div>

<div id="canvas-container">
  <div id="canvas">
    <div class="dot-grid" id="dot-grid"></div>
    <svg id="lines-svg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<div id="legend">
  <span style="font-weight:500;color:var(--tx1)">Connections:</span>
  <div class="leg-i"><div class="leg-line" style="border-color:var(--api)"></div>API</div>
  <div class="leg-i"><div class="leg-line" style="border-color:var(--manual);border-style:dashed"></div>Manual</div>
  <div class="leg-i"><div class="leg-line" style="border-color:var(--auto);border-style:dotted;border-width:2.5px"></div>Auto</div>
  <div class="tb-sep" style="height:16px"></div>
  <div class="leg-i"><span class="data-pill" style="font-size:10px;padding:2px 6px">process</span></div>
  <div class="leg-i"><span class="data-pill shared" style="font-size:10px;padding:2px 6px">shared entity</span></div>
</div>

<div id="minimap"><canvas id="minimap-canvas"></canvas><div class="viewport-rect" id="viewport-rect"></div></div>

<div id="info-panel"><h4 id="info-title"></h4><div id="info-conns"></div></div>

<div id="help-hint">Scroll to zoom · Drag to pan · Click systems to explore connections · Toggle ▾ to collapse</div>

let currentView='exhibitor', zoom=1, panX=0, panY=0;
let isPanning=false, startX=0, startY=0, startPanX=0, startPanY=0;
let highlightedSys=null, allCollapsed=false;
const boxElements={}, boxRects={}, collapsedState={};

const container=document.getElementById('canvas-container');
const canvas=document.getElementById('canvas');
const svg=document.getElementById('lines-svg');

function applyTransform(){
  canvas.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
  document.getElementById('zoom-display').textContent=Math.round(zoom*100)+'%';
  updateMinimap();
}

container.addEventListener('pointerdown',e=>{
  if(e.target.closest('.sys-box')||e.target.closest('.collapse-btn'))return;
  isPanning=true;startX=e.clientX;startY=e.clientY;startPanX=panX;startPanY=panY;
  container.classList.add('grabbing');container.setPointerCapture(e.pointerId);
});
container.addEventListener('pointermove',e=>{
  if(!isPanning)return;
  panX=startPanX+(e.clientX-startX);panY=startPanY+(e.clientY-startY);applyTransform();
});
container.addEventListener('pointerup',()=>{isPanning=false;container.classList.remove('grabbing')});
container.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=container.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const wx=(mx-panX)/zoom, wy=(my-panY)/zoom;
  const d=e.deltaY>0?0.9:1.1;
  zoom=Math.max(0.15,Math.min(3,zoom*d));
  panX=mx-wx*zoom;panY=my-wy*zoom;
  applyTransform();
},{passive:false});

function zoomTo(z){
  const rect=container.getBoundingClientRect();
  const cx=rect.width/2,cy=rect.height/2;
  const wx=(cx-panX)/zoom,wy=(cy-panY)/zoom;
  zoom=Math.max(0.15,Math.min(3,z));
  panX=cx-wx*zoom;panY=cy-wy*zoom;
  applyTransform();
}

function fitToView(){
  const view=VIEWS[currentView];
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  Object.values(view.systems).forEach(s=>{
    minX=Math.min(minX,s.x);minY=Math.min(minY,s.y);
    maxX=Math.max(maxX,s.x+240);maxY=Math.max(maxY,s.y+200);
  });
  const rect=container.getBoundingClientRect();
  const pad=60;
  const w=maxX-minX+pad*2, h=maxY-minY+pad*2;
  zoom=Math.min(rect.width/w, rect.height/h, 1.5);
  panX=(rect.width-w*zoom)/2 - (minX-pad)*zoom;
  panY=(rect.height-h*zoom)/2 - (minY-pad)*zoom;
  applyTransform();
}

function getBoxRect(id){
  const el=boxElements[id];
  if(!el)return null;
  const sys=VIEWS[currentView].systems[id];
  return{x:sys.x, y:sys.y, w:el.offsetWidth, h:el.offsetHeight};
}

function getAnchor(r1,r2){
  const c1x=r1.x+r1.w/2, c1y=r1.y+r1.h/2;
  const c2x=r2.x+r2.w/2, c2y=r2.y+r2.h/2;
  const dx=c2x-c1x, dy=c2y-c1y;
  let x1,y1,x2,y2;
  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>0){x1=r1.x+r1.w;x2=r2.x}else{x1=r1.x;x2=r2.x+r2.w}
    y1=c1y;y2=c2y;
  } else {
    if(dy>0){y1=r1.y+r1.h;y2=r2.y}else{y1=r1.y;y2=r2.y+r2.h}
    x1=c1x;x2=c2x;
  }
  return{x1,y1,x2,y2};
}

function drawLines(){
  svg.innerHTML='';
  const view=VIEWS[currentView];
  view.connections.forEach(conn=>{
    const r1=getBoxRect(conn.from), r2=getBoxRect(conn.to);
    if(!r1||!r2)return;
    const a=getAnchor(r1,r2);
    const color=conn.type==='api'?'var(--api)':conn.type==='manual'?'var(--manual)':'var(--auto)';
    const dash=conn.type==='api'?'':conn.type==='manual'?'8 5':'4 4';
    const mx=(a.x1+a.x2)/2;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${a.x1},${a.y1} C${mx},${a.y1} ${mx},${a.y2} ${a.x2},${a.y2}`);
    path.setAttribute('fill','none');path.setAttribute('stroke',color);path.setAttribute('stroke-width','2');
    if(dash)path.setAttribute('stroke-dasharray',dash);
    path.setAttribute('opacity','0.6');path.dataset.from=conn.from;path.dataset.to=conn.to;
    svg.appendChild(path);
    const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx',a.x2);circle.setAttribute('cy',a.y2);circle.setAttribute('r','4');
    circle.setAttribute('fill',color);circle.setAttribute('opacity','0.8');
    circle.dataset.from=conn.from;circle.dataset.to=conn.to;
    svg.appendChild(circle);

    if(conn.label){
      const lx=(a.x1+a.x2)/2, ly=(a.y1+a.y2)/2 - 8;
      const text=document.createElementNS('http://www.w3.org/2000/svg','text');
      text.setAttribute('x',lx);text.setAttribute('y',ly);
      text.setAttribute('text-anchor','middle');text.setAttribute('fill','var(--tx3)');
      text.setAttribute('font-size','10');text.setAttribute('font-family','DM Sans,system-ui,sans-serif');
      text.textContent=conn.label;text.dataset.from=conn.from;text.dataset.to=conn.to;
      svg.appendChild(text);
    }
  });
}

function renderBoxes(){
  Object.values(boxElements).forEach(el=>el.remove());
  Object.keys(boxElements).forEach(k=>delete boxElements[k]);
  highlightedSys=null;
  document.getElementById('info-panel').classList.remove('open');

  const view=VIEWS[currentView];
  Object.entries(view.systems).forEach(([id,sys])=>{
    const box=document.createElement('div');
    box.className=`sys-box ${sys.cls}`;
    box.style.left=sys.x+'px';box.style.top=sys.y+'px';
    box.dataset.id=id;

    const isCollapsed=collapsedState[currentView+'_'+id]||false;

    let html=`<div class="sys-head"><div><div class="sys-title">${sys.title}</div>`;
    if(sys.sub)html+=`<div class="sys-sub">${sys.sub}</div>`;
    html+=`</div><button class="collapse-btn" data-id="${id}" onclick="event.stopPropagation();toggleCollapse('${id}')">${isCollapsed?'▸':'▾'}</button></div>`;
    html+=`<div class="sys-data${isCollapsed?' collapsed':''}" id="data-${id}">`;
    sys.data.forEach(d=>{html+=`<span class="data-pill${d.s?' shared':''}">${d.n}</span>`;});
    html+=`</div>`;

    const intCls=sys.int==='api'?'int-api':sys.int==='manual'?'int-manual':'int-auto';
    html+=`<div class="int-badge ${intCls}"></div>`;

    box.innerHTML=html;
    box.addEventListener('click',()=>clickSystem(id));
    canvas.appendChild(box);
    boxElements[id]=box;
  });

  requestAnimationFrame(()=>{requestAnimationFrame(()=>{drawLines();updateMinimap()})});
}

function toggleCollapse(id){
  const key=currentView+'_'+id;
  collapsedState[key]=!collapsedState[key];
  const dataEl=document.getElementById('data-'+id);
  const btn=document.querySelector(`.collapse-btn[data-id="${id}"]`);
  if(collapsedState[key]){dataEl.classList.add('collapsed');btn.textContent='▸';}
  else{dataEl.classList.remove('collapsed');btn.textContent='▾';}
  setTimeout(()=>drawLines(),310);
}

function toggleAll(){
  allCollapsed=!allCollapsed;
  const view=VIEWS[currentView];
  Object.keys(view.systems).forEach(id=>{
    const key=currentView+'_'+id;
    collapsedState[key]=allCollapsed;
    const dataEl=document.getElementById('data-'+id);
    const btn=document.querySelector(`.collapse-btn[data-id="${id}"]`);
    if(dataEl){if(allCollapsed){dataEl.classList.add('collapsed');btn.textContent='▸';}
    else{dataEl.classList.remove('collapsed');btn.textContent='▾';}}
  });
  document.getElementById('collapse-all-btn').textContent=allCollapsed?'Expand all':'Collapse all';
  setTimeout(()=>drawLines(),310);
}

function clickSystem(id){
  const view=VIEWS[currentView];
  if(highlightedSys===id){
    highlightedSys=null;
    document.querySelectorAll('.sys-box').forEach(b=>b.classList.remove('dimmed','highlight'));
    svg.querySelectorAll('path,circle,text').forEach(p=>{
      p.setAttribute('opacity',p.tagName==='text'?'1':'0.6');
      if(p.tagName==='path')p.setAttribute('stroke-width','2');
    });
    document.getElementById('info-panel').classList.remove('open');
    return;
  }
  highlightedSys=id;
  const connected=new Set([id]);
  const connDetails=[];
  view.connections.forEach(c=>{
    if(c.from===id||c.to===id){
      connected.add(c.from);connected.add(c.to);
      const otherId=c.from===id?c.to:c.from;
      const dir=c.from===id?'→':'←';
      connDetails.push({name:view.systems[otherId]?.title||otherId,type:c.type,label:c.label||'',dir});
    }
  });
  document.querySelectorAll('.sys-box').forEach(b=>{
    if(connected.has(b.dataset.id)){b.classList.remove('dimmed');b.classList.toggle('highlight',b.dataset.id===id);}
    else{b.classList.add('dimmed');b.classList.remove('highlight');}
  });
  svg.querySelectorAll('path,circle,text').forEach(p=>{
    const isConn=connected.has(p.dataset.from)&&connected.has(p.dataset.to)&&(p.dataset.from===id||p.dataset.to===id);
    if(isConn){p.setAttribute('opacity','1');if(p.tagName==='path')p.setAttribute('stroke-width','3');}
    else{p.setAttribute('opacity','0.06');if(p.tagName==='path')p.setAttribute('stroke-width','2');}
  });

  const panel=document.getElementById('info-panel');
  document.getElementById('info-title').textContent=view.systems[id].title;
  let html='';
  connDetails.forEach(c=>{
    const cls=c.type==='api'?'ct-api':c.type==='manual'?'ct-manual':'ct-auto';
    const label=c.type==='api'?'API':c.type==='manual'?'Manual':'Auto';
    html+=`<div class="conn-row"><span class="conn-tag ${cls}">${label}</span><b>${c.dir} ${c.name}</b>${c.label?' — '+c.label:''}</div>`;
  });
  document.getElementById('info-conns').innerHTML=html;
  panel.classList.add('open');
}

function setView(v,btn){
  currentView=v;allCollapsed=false;
  document.getElementById('collapse-all-btn').textContent='Collapse all';
  document.querySelectorAll('.tb-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderBoxes();
  setTimeout(()=>fitToView(),50);
}

function updateMinimap(){
  const mc=document.getElementById('minimap-canvas');
  const ctx=mc.getContext('2d');
  const mw=180,mh=120;mc.width=mw;mc.height=mh;
  ctx.clearRect(0,0,mw,mh);

  const view=VIEWS[currentView];
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  Object.values(view.systems).forEach(s=>{
    minX=Math.min(minX,s.x-40);minY=Math.min(minY,s.y-40);
    maxX=Math.max(maxX,s.x+260);maxY=Math.max(maxY,s.y+220);
  });
  const cw=maxX-minX,ch=maxY-minY;
  const sc=Math.min(mw/cw,mh/ch)*0.9;
  const ox=(mw-cw*sc)/2,oy=(mh-ch*sc)/2;

  const colors={
    'c-pur':'#7c6cf0','c-tea':'#34d399','c-cor':'#f97316','c-pin':'#f472b6',
    'c-blu':'#60a5fa','c-gra':'#9898a4','c-amb':'#fbbf24','c-grn':'#34d399'
  };

  Object.values(view.systems).forEach(s=>{
    const x=ox+(s.x-minX)*sc, y=oy+(s.y-minY)*sc;
    ctx.fillStyle=colors[s.cls]||'#666';
    ctx.globalAlpha=0.6;
    ctx.fillRect(x,y,20*sc,12*sc);
  });
  ctx.globalAlpha=1;

  const rect=container.getBoundingClientRect();
  const vx=ox+(-panX/zoom-minX)*sc, vy=oy+(-panY/zoom-minY)*sc;
  const vw=rect.width/zoom*sc, vh=rect.height/zoom*sc;
  const vr=document.getElementById('viewport-rect');
  vr.style.left=Math.max(0,vx)+'px';vr.style.top=Math.max(0,vy)+'px';
  vr.style.width=Math.min(mw,vw)+'px';vr.style.height=Math.min(mh,vh)+'px';
}

document.getElementById('minimap').addEventListener('click',e=>{
  const rect=e.currentTarget.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const mw=180,mh=120;

  const view=VIEWS[currentView];
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  Object.values(view.systems).forEach(s=>{
    minX=Math.min(minX,s.x-40);minY=Math.min(minY,s.y-40);
    maxX=Math.max(maxX,s.x+260);maxY=Math.max(maxY,s.y+220);
  });
  const cw=maxX-minX,ch=maxY-minY;
  const sc=Math.min(mw/cw,mh/ch)*0.9;
  const ox=(mw-cw*sc)/2,oy=(mh-ch*sc)/2;

  const canvasX=(mx-ox)/sc+minX;
  const canvasY=(my-oy)/sc+minY;
  const cr=container.getBoundingClientRect();
  panX=-canvasX*zoom+cr.width/2;
  panY=-canvasY*zoom+cr.height/2;
  applyTransform();
});

setTimeout(()=>{document.getElementById('help-hint').style.opacity='0'},4000);

renderBoxes();
setTimeout(()=>fitToView(),100);
</script>
