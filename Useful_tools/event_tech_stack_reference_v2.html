<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Tech Stack Reference</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f4f0;
    --color-background-tertiary: #eeede9;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #6b6b66;
    --color-border-tertiary: rgba(0,0,0,0.1);
    --color-border-secondary: rgba(0,0,0,0.2);
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #1c1c1a;
      --color-background-secondary: #252523;
      --color-background-tertiary: #2e2e2b;
      --color-text-primary: #e8e6df;
      --color-text-secondary: #9c9a92;
      --color-border-tertiary: rgba(255,255,255,0.1);
      --color-border-secondary: rgba(255,255,255,0.2);
    }
  }

  body {
    font-family: var(--font-sans);
    background: var(--color-background-tertiary);
    color: var(--color-text-primary);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    background: var(--color-background-primary);
    border-radius: var(--border-radius-lg);
    border: 0.5px solid var(--color-border-tertiary);
    padding: 2rem;
  }

  .page-title { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
  .page-sub { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 1.5rem; }

  .event-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
  .tab {
    padding: 7px 14px; border-radius: 20px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1.5px solid transparent; transition: all 0.18s;
    font-family: var(--font-sans); background: var(--color-background-secondary); color: var(--color-text-secondary);
  }
  .tab:hover { background: var(--color-background-tertiary); color: var(--color-text-primary); }
  .tab.active { background: var(--tab-bg); color: var(--tab-color); border-color: var(--tab-border); }

  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 1rem; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--color-text-secondary); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .tier-core { background: #2ecc71; }
  .tier-recommended { background: #f39c12; }
  .tier-optional { background: var(--color-border-secondary); }

  .event-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 0.75rem; }
  .meta-pill { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-family: var(--font-mono); }

  .complexity-bar { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--color-text-secondary); margin-bottom: 1rem; }
  .bar-track { flex: 1; height: 4px; background: var(--color-border-tertiary); border-radius: 2px; max-width: 140px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }

  .compare-note {
    background: var(--color-background-secondary);
    border-left: 3px solid var(--accent-color, var(--color-border-secondary));
    padding: 10px 14px; border-radius: 0 8px 8px 0;
    font-size: 13px; color: var(--color-text-secondary); line-height: 1.6; margin-bottom: 1.25rem;
  }
  .compare-note strong { color: var(--color-text-primary); font-weight: 500; }

  .section-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; color: var(--color-text-secondary); margin-bottom: 8px; }

  .stack-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }

  .category-card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 14px 14px 10px;
    border-top: 3px solid var(--cat-color, var(--color-border-secondary));
  }

  .category-title { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-text-secondary); margin-bottom: 10px; }

  .feature-row {
    padding: 7px 0;
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }
  .feature-row:last-child { border-bottom: none; }

  .feature-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 3px; }
  .tier-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }

  .feature-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); line-height: 1.3; }

  .supplier-line { display: flex; align-items: flex-start; gap: 5px; padding-left: 16px; margin-top: 2px; }
  .supplier-label { font-size: 11px; color: var(--color-text-secondary); font-family: var(--font-mono); flex-shrink: 0; }
  .supplier-names { font-size: 11px; color: var(--color-text-secondary); font-style: italic; line-height: 1.4; }
</style>
</head>

function renderEvent(ev) {
  document.getElementById('meta').innerHTML = ev.meta.map(m =>
    `<span class="meta-pill" style="background:${m.bg};color:${m.color}">${m.label}</span>`
  ).join('');

  document.getElementById('complexity').innerHTML = `
    <span>Stack complexity</span>
    <div class="bar-track"><div class="bar-fill" style="width:${ev.complexity}%;background:${ev.color.bar}"></div></div>
    <span style="font-size:12px;font-family:var(--font-mono)">${ev.complexity}/100</span>
  `;

  const note = document.getElementById('keynote');
  note.innerHTML = ev.note;
  note.style.setProperty('--accent-color', ev.color.accent);

  document.getElementById('grid').innerHTML = ev.categories.map(cat => `
    <div class="category-card" style="--cat-color:${cat.color}">
      <div class="category-title">${cat.title}</div>
      ${cat.tools.map(t => `
        <div class="feature-row">
          <div class="feature-top">
            <div class="tier-dot tier-${t.tier}"></div>
            <div class="feature-name">${t.name}</div>
          </div>
          <div class="supplier-line">
            <span class="supplier-label">e.g.</span>
            <span class="supplier-names">${t.suppliers}</span>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function renderTabs(active) {
  document.getElementById('tabs').innerHTML = events.map(ev => `
    <button class="tab ${ev.id === active ? 'active' : ''}"
      style="--tab-bg:${ev.color.bg};--tab-color:${ev.color.text};--tab-border:${ev.color.border}"
      onclick="selectEvent('${ev.id}')">${ev.label}</button>
  `).join('');
}

function selectEvent(id) {
  const ev = events.find(e => e.id === id);
  if (!ev) return;
  renderTabs(id);
  renderEvent(ev);
}

selectEvent('conference');
</script>
</body>
</html>
